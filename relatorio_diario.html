{% extends "base.html" %}
{% block content %}
<h2>Relatório diário</h2>

<form class="row g-3 mb-3" method="get" action="{{ url_for('relatorio_diario') }}">
  <div class="col-auto">
    <label class="form-label">Data (AAAA-MM-DD)</label>
    <input type="date" name="dia" value="{{ dia }}" class="form-control">
  </div>
  <div class="col-auto d-flex align-items-end">
    <button type="submit" class="btn btn-primary">Carregar</button>
  </div>
</form>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Placa</th><th>Entrada</th><th>Valor (R$)</th>
    </tr>
  </thead>
  <tbody>
    {% for placa, entrada, valor in registros %}
      <tr>
        <td>{{ placa }}</td>
        <td>{{ entrada }}</td>
        <td>{{ "%.2f"|format(valor) }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>

<h5 class="text-end">Total do dia: R$ {{ "%.2f"|format(total) }}</h5>
{% endblock %}
