<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar usuário - Estacionamento</title>
</head>
<body>
    <h1>Registrar Usuário</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
        {% for categoria, mensagem in messages %}
          <li><strong>{{ categoria }}:</strong> {{ mensagem }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('registrar_usuario') }}" method="post">
        <label>Nome:</label>
        <input type="text" name="nome" required><br>

        <label>E-mail:</label>
        <input type="email" name="email" required><br>

        <label>Senha:</label>
        <input type="password" name="senha" required><br>

        <label>Confirmar Senha:</label>
        <input type="password" name="confirmar" required><br>

        <button type="submit">Registrar</button>
    </form>

    <p>Já tem conta? <a href="{{ url_for('login') }}">Fazer login</a></p>
</body>
</html>
