{% extends "base.html" %}

{% block content %}
<h2>Movimentação</h2>

<div class="row mb-4">
  <div class="col-md-6">
    <form method="post" action="{{ url_for('registrar_entrada') }}">
      <h5>Registrar entrada</h5>
      <div class="mb-2">
        <label class="form-label">Placa</label>
        <input
          type="text"
          name="placa"
          class="form-control"
          autocomplete="off"
          value=""
        >
      </div>
      <button type="submit" class="btn btn-success">Registrar entrada</button>
    </form>
  </div>

  <div class="col-md-6">
    <form method="post" action="{{ url_for('registrar_pagamento') }}">
      <h5>Registrar pagamento (fecha sessão)</h5>
      <div class="mb-2">
        <label class="form-label">Placa</label>
        <input
          type="text"
          name="placa"
          class="form-control"
          autocomplete="off"
          value=""
        >
      </div>
      <button type="submit" class="btn btn-info">Registrar pagamento</button>
    </form>
  </div>
</div>
{% endblock %}
